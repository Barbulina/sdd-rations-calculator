name: Deploy to GitHub Pages

# Trigger: every push to main (covers all PR merges)
on:
  push:
    branches: [main]

# Prevent overlapping deployments — cancel in-progress run if a newer one starts
concurrency:
  group: pages
  cancel-in-progress: true

# Minimum permissions required by the official deploy-pages action
permissions:
  contents: read # read source
  pages: write # write to GitHub Pages
  id-token: write # OIDC token for trusted deployment (no PAT needed)

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: build
  # Install → Test → Build static export → Upload artifact
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm # caches node_modules between runs

      - name: Install dependencies
        run: npm ci # clean install — respects package-lock.json

      - name: Run tests
        run: npm test -- --run # Vitest in run mode (no watch)

      - name: Build static export
        run: npm run build
        # Produces out/ directory. Requires next.config.ts:
        #   output: 'export'
        #   basePath: '/sdd-rations-calculator'
        #   trailingSlash: true
        #   images: { unoptimized: true }

      - name: Add .nojekyll
        run: touch out/.nojekyll
        # Prevents GitHub Pages / Jekyll from hiding _next/ asset folder

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/ # directory produced by next build with output:'export'

  # ──────────────────────────────────────────────
  # JOB 2: deploy
  # Deploys the artifact from job 1 to GitHub Pages
  # ──────────────────────────────────────────────
  deploy:
    needs: build # only runs if build succeeds
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }} # shown in GitHub Environments tab
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
